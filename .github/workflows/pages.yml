name: Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build terminal site
        run: npm run build
        env:
          WB_BASE: /WaffleBits

      - name: Validate build output
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/assets/avatar.jpg
          test -f dist/assets/AdnanBerik-Resume.pdf
          # Validate the things a visitor actually needs, not specific jargon.
          grep -q "Adnan Berik" dist/index.html
          grep -q "AdnanBerik-Resume.pdf" dist/index.html
          grep -q "adnanberik@hotmail.com" dist/index.html
          grep -q "linkedin.com/in/adnanberik" dist/index.html
          grep -q "wafflebits.github.io/readiness-control-tower" dist/index.html
          # Every project must still link to its repository.
          for r in secure-gpu-inference-gateway deterministic-inference-scheduler \
                   triton-kernel-lab triton-inference-benchmark \
                   readiness-control-tower heterocore-compiler \
                   market-microstructure-engine; do
            grep -q "$r" dist/index.html || { echo "missing project link: $r"; exit 1; }
          done
          # No em dashes anywhere in the rendered page.
          if grep -q "$(printf '—')" dist/index.html; then echo "em dash found"; exit 1; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
